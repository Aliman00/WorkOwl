version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: workowl-db
    environment:
      POSTGRES_USER: workowl
      POSTGRES_PASSWORD: workowl_dev_pass
      POSTGRES_DB: workowl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workowl"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - workowl-network

  backend:
    build:
      context: .
      dockerfile: WorkOwl.Backend/Dockerfile
    container_name: workowl-backend
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=workowl;Username=workowl;Password=workowl_dev_pass
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - workowl-network

  frontend:
    build:
      context: .
      dockerfile: WorkOwl.Frontend/Dockerfile
    container_name: workowl-frontend
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - BackendUrl=http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - workowl-network

  adminer:
    image: adminer
    container_name: workowl-adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - workowl-network

volumes:
  postgres_data:

networks:
  workowl-network:
    driver: bridge
