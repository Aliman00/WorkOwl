version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: workowl-db
    environment:
      POSTGRES_USER: workowl
      POSTGRES_PASSWORD: workowl_dev_pass
      POSTGRES_DB: workowl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workowl"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: workowl-adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
